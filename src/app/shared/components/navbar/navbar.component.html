<header class="top-navbar">
  <div class="navbar-left">
    <button class="menu-toggle" mat-icon-button>
      <mat-icon>menu</mat-icon>
    </button>
    <div class="greeting">
      <span class="greeting-text">Welcome back, <strong>{{ userName }}</strong></span>
    </div>
  </div>

  <div class="navbar-right">
    <button mat-icon-button class="nav-icon-btn" matTooltip="Settings">
      <mat-icon>tune</mat-icon>
    </button>

    <!-- ✅ FIX 3: Real notification bell with unread badge -->
    <div class="notif-wrapper">
      <button mat-icon-button class="nav-icon-btn" (click)="toggleNotifPanel()" matTooltip="Notifications">
        <mat-icon>notifications_none</mat-icon>
        <span class="notif-badge" *ngIf="notifCount > 0">{{ notifCount > 9 ? '9+' : notifCount }}</span>
      </button>

      <!-- Notification dropdown panel -->
      <div class="notif-panel" *ngIf="showNotifPanel" (clickOutside)="showNotifPanel=false">
        <div class="notif-panel-header">
          <h4>Notifications</h4>
          <button mat-button class="mark-read-btn" (click)="markAllRead()" *ngIf="notifCount > 0">
            Mark all read
          </button>
        </div>

        <div class="notif-list" *ngIf="notifications.length > 0; else noNotifs">
          <div class="notif-item" *ngFor="let n of notifications"
            [class.unread]="!n.read" [ngClass]="n.type">
            <div class="notif-dot" *ngIf="!n.read"></div>
            <div class="notif-icon">
              <mat-icon>{{ n.type === 'assigned' ? 'directions_run' : n.type === 'completed' ? 'check_circle' : 'info' }}</mat-icon>
            </div>
            <div class="notif-body">
              <p class="notif-title">{{ n.title }}</p>
              <p class="notif-msg">{{ n.message }}</p>
              <span class="notif-time">{{ n.createdAt | date:'short' }}</span>
            </div>
          </div>
        </div>

        <ng-template #noNotifs>
          <div class="notif-empty">
            <mat-icon>notifications_none</mat-icon>
            <p>No notifications yet.</p>
          </div>
        </ng-template>
      </div>
    </div>

    <!-- Profile dropdown -->
    <button mat-button [matMenuTriggerFor]="profileMenu" class="profile-btn">
      <div class="avatar-wrapper">
        <div class="avatar"><mat-icon>person</mat-icon></div>
        <div class="user-info">
          <span class="user-name">{{ userName }}</span>
          <!-- ✅ FIX 1: roleLabel now always reflects stored role, not URL -->
          <span class="user-role">{{ roleLabel }}</span>
        </div>
        <mat-icon class="chevron">expand_more</mat-icon>
      </div>
    </button>

    <mat-menu #profileMenu="matMenu" xPosition="before" class="profile-menu">
      <div class="menu-header">
        <div class="menu-avatar"><mat-icon>person</mat-icon></div>
        <div>
          <p class="menu-name">{{ userName }}</p>
          <p class="menu-role">{{ roleLabel }}</p>
        </div>
      </div>
      <mat-divider></mat-divider>
      <button mat-menu-item routerLink="/profile">
        <mat-icon>manage_accounts</mat-icon><span>My Profile</span>
      </button>
      <button mat-menu-item (click)="toggleDarkMode()">
        <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
        <span>{{ isDarkMode ? 'Light Mode' : 'Dark Mode' }}</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="onLogout()" class="logout-menu-item">
        <mat-icon>logout</mat-icon><span>Sign Out</span>
      </button>
    </mat-menu>
  </div>
</header>
